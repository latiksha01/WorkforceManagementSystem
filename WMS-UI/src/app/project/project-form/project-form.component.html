<div class="dialog-header">
  <h2>{{ isEdit ? 'Edit Project' : 'Add Project' }}</h2>
  <button mat-icon-button (click)="close()"><mat-icon>close</mat-icon></button>
</div>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Project Name</mat-label>
      <mat-icon matPrefix>work</mat-icon>
      <input matInput formControlName="projectName" placeholder="e.g. WMS Migration">
      <mat-error *ngIf="form.get('projectName')?.hasError('required')">Project name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Client (optional)</mat-label>
      <mat-icon matPrefix>business</mat-icon>
      <mat-select formControlName="clientId">
        <mat-option [value]="null">Internal (No Client)</mat-option>
        <mat-option *ngFor="let c of clients" [value]="c.clientId">{{ c.clientName }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Start Date</mat-label>
        <mat-icon matPrefix>event</mat-icon>
        <input matInput [matDatepicker]="startPicker" formControlName="startDate">
        <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>End Date</mat-label>
        <mat-icon matPrefix>event_busy</mat-icon>
        <input matInput [matDatepicker]="endPicker" formControlName="endDate">
        <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-icon matPrefix>flag</mat-icon>
      <mat-select formControlName="status">
        <mat-option value="Active">Active</mat-option>
        <mat-option value="OnHold">On Hold</mat-option>
        <mat-option value="Completed">Completed</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('status')?.hasError('required')">Status is required</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-stroked-button (click)="close()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="saving">
    <mat-spinner *ngIf="saving" diameter="18"></mat-spinner>
    <span *ngIf="!saving">{{ isEdit ? 'Update' : 'Create' }}</span>
  </button>
</mat-dialog-actions>

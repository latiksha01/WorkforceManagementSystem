<div class="page-header">
  <h2>Roles</h2>
  <button mat-raised-button color="primary" (click)="openDialog()">
    <mat-icon>add</mat-icon> Add Role
  </button>
</div>
<div class="table-container">
  <div class="table-toolbar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search roles</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput (keyup)="applyFilter($event)" placeholder="Type to search...">
    </mat-form-field>
    <span class="record-count">{{ dataSource.filteredData.length }} record(s)</span>
  </div>
  <div *ngIf="loading" class="loading-overlay"><mat-spinner diameter="40"></mat-spinner></div>
  <table mat-table [dataSource]="dataSource" matSort *ngIf="!loading">
    <ng-container matColumnDef="roleId">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
      <td mat-cell *matCellDef="let r"><span class="id-chip">{{ r.roleId }}</span></td>
    </ng-container>
    <ng-container matColumnDef="roleName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Role Name</th>
      <td mat-cell *matCellDef="let r">
        <div class="name-cell">
          <div class="avatar purple">{{ r.roleName.charAt(0) }}</div>
          <strong>{{ r.roleName }}</strong>
        </div>
      </td>
    </ng-container>
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let r"><span class="desc-text">{{ r.description || '—' }}</span></td>
    </ng-container>
    <ng-container matColumnDef="createdOn">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Created On</th>
      <td mat-cell *matCellDef="let r">{{ r.createdOn | date:'mediumDate' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let r">
        <div class="action-icons">
          <button mat-icon-button color="primary" (click)="openDialog(r)" matTooltip="Edit"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="delete(r)" matTooltip="Delete"><mat-icon>delete_outline</mat-icon></button>
        </div>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let row; columns: cols;"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td [attr.colspan]="cols.length"><div class="empty-state"><mat-icon>badge</mat-icon><p>No roles found</p></div></td>
    </tr>
  </table>
  <mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons></mat-paginator>
</div>

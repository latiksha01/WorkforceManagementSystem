<div class="dialog-header">
  <h2>{{ isEdit ? 'Edit Role' : 'Add Role' }}</h2>
  <button mat-icon-button (click)="close()"><mat-icon>close</mat-icon></button>
</div>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Role Name</mat-label>
      <mat-icon matPrefix>badge</mat-icon>
      <input matInput formControlName="roleName" placeholder="e.g. Senior Developer">
      <mat-error *ngIf="form.get('roleName')?.hasError('required')">Role name is required</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description (optional)</mat-label>
      <mat-icon matPrefix>notes</mat-icon>
      <textarea matInput formControlName="description" rows="3" placeholder="Brief description"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-stroked-button (click)="close()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="saving">
    <mat-spinner *ngIf="saving" diameter="18"></mat-spinner>
    <span *ngIf="!saving">{{ isEdit ? 'Update' : 'Create' }}</span>
  </button>
</mat-dialog-actions>
